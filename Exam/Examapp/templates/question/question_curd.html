<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question CRUD</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/questions.css' %}">

    <style>

        body{
            background-image:url('https://www.shutterstock.com/image-vector/abstract-question-marks-futuristic-concept-260nw-2345518871.jpg');
            background-repeat:no-repeat;
            background-size:cover;
            background-attachment:fixed;
            font-family:Arial, sans-serif;
        }

        nav{
            text-align:center;
            margin-top:20px;
        }

        nav a{
            text-decoration:none;
            color:white;
            font-weight:bold;
            margin:10px;
            padding:10px;
        }

        nav a:hover{
            color:yellow;
        }

        .form-container{
            width:600px;
            margin:40px auto;
            background:rgba(0,0,0,0.75);
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px white;
        }

        .form-container h2{
            text-align:center;
            color:white;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:15px;
        }

        .form-group label{
            display:inline-block;
            width:120px;
            color:white;
            font-size:16px;
            font-weight:bold;
        }

        .form-group input{
            width:300px;
            padding:8px;
            border:2px solid white;
            border-radius:5px;
        }

        .button-container{
            text-align:center;
            margin-top:25px;
        }

        .btn{
            padding:12px 20px;
            margin:8px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:15px;
            font-weight:bold;
            color:white;
            transition:0.3s;
        }

        .add-btn{
            background:#28a745;
        }

        .view-btn{
            background:#007bff;
        }

        .update-btn{
            background:#ffc107;
            color:black;
        }

        .delete-btn{
            background:#dc3545;
        }

        .show-btn{
            background:#6f42c1;
        }

        .btn:hover{
            transform:scale(1.05);
        }

        .message{
            display:block;
            text-align:center;
            margin-top:20px;
            color:white;
            font-size:18px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <nav>
        <a href="/Examapp/giveaddquestion/">Add Question</a>
        <a href="/Examapp/giveviewquestion/">View Question</a>
        <a href="/Examapp/giveupdatequestion/">Update Question</a>
        <a href="/Examapp/givedeletequestion/">Delete Question</a>
        <a href="/Examapp/givemeshowallquestion/">Show All Questions</a>
        <a href="/Examapp/">Home Page</a>
    </nav>

    <hr>

    <form method="get">

        <div class="form-container">

            <h2>Question Management</h2>

            <div class="form-group">
                <label>Q No :</label>
                <input type="number" name="qno"
                       value="{{ qdata.qno|default:'' }}">
            </div>

            <div class="form-group">
                <label>Question :</label>
                <input type="text" name="qtext"
                       value="{{ qdata.qtext|default:'' }}">
            </div>

            <div class="form-group">
                <label>Option 1 :</label>
                <input type="text" name="op1"
                       value="{{ qdata.op1|default:'' }}">
            </div>

            <div class="form-group">
                <label>Option 2 :</label>
                <input type="text" name="op2"
                       value="{{ qdata.op2|default:'' }}">
            </div>

            <div class="form-group">
                <label>Option 3 :</label>
                <input type="text" name="op3"
                       value="{{ qdata.op3|default:'' }}">
            </div>

            <div class="form-group">
                <label>Option 4 :</label>
                <input type="text" name="op4"
                       value="{{ qdata.op4|default:'' }}">
            </div>

            <div class="form-group">
                <label>Subject :</label>
                <input type="text" name="subject"
                       value="{{ qdata.subject|default:'' }}">
            </div>

            <div class="form-group">
                <label>Answer :</label>
                <input type="text" name="answer"
                       value="{{ qdata.ans|default:'' }}"
                       placeholder="op1 / op2 / op3 / op4">
            </div>

            <div class="button-container">

                <button type="submit"
                        formaction="/Examapp/addquestion/"
                        class="btn add-btn">
                    ➕ Add
                </button>

                <button type="submit"
                        formaction="/Examapp/viewquestion/"
                        class="btn view-btn">
                    🔍 View
                </button>

                <button type="submit"
                        formaction="/Examapp/updatequestion/"
                        class="btn update-btn">
                    ✏️ Update
                </button>

                <button type="submit"
                        formaction="/Examapp/deletequestion/"
                        class="btn delete-btn">
                    🗑 Delete
                </button>

                <button type="submit"
                        formaction="/Examapp/givemeshowallquestion/"
                        class="btn show-btn">
                    📋 Show All
                </button>

            </div>

            <span class="message">
                {{ msg }}
            </span>

        </div>

    </form>

</body>
</html>
