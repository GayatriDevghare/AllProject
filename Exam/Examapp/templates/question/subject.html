<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Exam</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/questions.css' %}">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#87CEEB,#000080);
        }

        .container{
            width:450px;
            background:rgba(255,255,255,0.95);
            padding:35px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.4);
            text-align:center;
        }

        h2{
            color:#000080;
            margin-bottom:10px;
        }

        .welcome{
            font-size:18px;
            margin-bottom:25px;
            color:#333;
            font-weight:bold;
        }

        label{
            display:block;
            margin-bottom:10px;
            font-size:18px;
            font-weight:bold;
            color:#222;
        }

        select{
            width:100%;
            padding:12px;
            border:2px solid #000080;
            border-radius:8px;
            font-size:16px;
            margin-bottom:25px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#000080;
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#0033cc;
            transform:scale(1.02);
        }

        .msg{
            margin-top:15px;
            color:red;
            font-weight:bold;
        }

        .home-link{
            display:block;
            margin-top:15px;
            text-decoration:none;
            font-weight:bold;
            color:#000080;
        }

        .home-link:hover{
            color:#0033cc;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>📝 Online Examination System</h2>

    <!-- Student Name from Session -->
    <div class="welcome">
        Welcome, {{ request.session.username|default:"Guest" }}
    </div>

    <form method="POST" action="/Examapp/starttestpage/">
        {% csrf_token %}

        <label>Select Subject</label>

        <select name="subject" required>
            <option value="">-- Choose Subject --</option>

            {% for s in subjects %}
                <option value="{{ s }}">
                    {{ s|title }}
                </option>
            {% endfor %}
        </select>

        <button type="submit" class="btn">
            🚀 Start Test
        </button>

        <a href="/Examapp/" class="home-link">
            🏠 Back to Home
        </a>

        {% if msg %}
            <div class="msg">
                {{ msg }}
            </div>
        {% endif %}

    </form>

</div>

</body>
</html>
