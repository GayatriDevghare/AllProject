<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Student</title>

```
{% load static %}

<style>

    body{
        margin:0;
        font-family:Arial, sans-serif;
        background-repeat:no-repeat;
        background-size:cover;
    }

    .container{
        width:500px;
        margin:80px auto;
        background-image:url('https://cdn.vectorstock.com/i/500p/99/75/flying-pencil-school-adventure-vector-35699975.jpg');
        padding:30px;
        border-radius:15px;
        box-shadow:0px 0px 15px black;
    }

    .back-btn{
        text-decoration:none;
        color:black;
        font-weight:bold;
    }

    h2{
        text-align:center;
        margin-bottom:25px;
        color:black;
    }

    label{
        display:block;
        font-weight:bold;
        margin-top:10px;
    }

    input{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:2px solid #555;
        border-radius:5px;
        box-sizing:border-box;
    }

    .btn{
        width:100%;
        padding:12px;
        margin-top:20px;
        border:none;
        border-radius:5px;
        background:black;
        color:white;
        cursor:pointer;
        font-size:16px;
    }

    .btn:hover{
        background:#333;
    }

    .student-details{
        margin-top:25px;
        padding:15px;
        background:#f5f5f5;
        border-radius:8px;
        border-left:5px solid green;
    }

    .student-details p{
        margin:10px 0;
        font-size:16px;
    }

    .message{
        text-align:center;
        margin-top:20px;
        font-size:18px;
        font-weight:bold;
        color:red;
    }

</style>
```

</head>

<body>

```
<div class="container">

    <a href="/Examapp/givemestudentcurd/" class="back-btn">
        ← Student Operations
    </a>

    <h2>View Student</h2>

    <form method="GET" action="/Examapp/showstudent/">

        <label>Username</label>
        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <button type="submit" class="btn">
            🔍 Search Student
        </button>

    </form>

    {% if udata %}

    <div class="student-details">

        <p>
            <strong>Username:</strong>
            {{ udata.username }}
        </p>

        <p>
            <strong>Password:</strong>
            {{ udata.password }}
        </p>

    </div>

    {% endif %}

    {% if msg %}
    <div class="message">
        {{ msg }}
    </div>
    {% endif %}

</div>
```

</body>

</html>
