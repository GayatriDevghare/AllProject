<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Results</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background-repeat:no-repeat;
            background-size:cover;
            background-position:center;
            min-height:100vh;
        }

        .container{
            width:600px;
            margin:auto;
            margin-top:50px;
            padding-top:30px;
            background-image:url('https://png.pngtree.com/thumb_back/fh260/back_pic/05/12/61/50599a3b340d5da.jpg');
            background-size:cover;  
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:25px;
            background:rgba(0,0,0,0.7);
            padding:15px;
            border-radius:10px;
        }

        .btn-container{
            text-align:center;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            padding:10px 20px;
            margin:8px;
            border-radius:8px;
            font-weight:bold;
            color:white;
            transition:0.3s;
        }

        .home-btn{
            background:#007bff;
        }

        .test-btn{
            background:#28a745;
        }

        .refresh-btn{
            background:#6f42c1;
        }

        .back-btn{
            background:#dc3545;
        }

        .btn:hover{
            transform:scale(1.05);
            opacity:0.9;
        }

        table{
            width:80%;
            margin:auto;
            border-collapse:collapse;
            background:rgba(255,255,255,0.92);
            box-shadow:0px 0px 15px rgba(0,0,0,0.4);
        }

        th{
            background:black;
            color:white;
            padding:12px;
            font-size:16px;
        }

        td{
            padding:12px;
            text-align:center;
            border:1px solid #ddd;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        tr:hover{
            background:#d9edf7;
        }

        .no-data{
            text-align:center;
            color:white;
            font-size:22px;
            font-weight:bold;
            margin-top:50px;
            background:rgba(0,0,0,0.6);
            padding:20px;
            width:40%;
            margin-left:auto;
            margin-right:auto;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📊 Result of All Users</h1>

    <div class="btn-container">

        <a href="/Examapp/" class="btn home-btn">
            🏠 Home
        </a>

        <a href="/Examapp/subject/" class="btn test-btn">
            📝 Start Test
        </a>

        <a href="/Examapp/getallresultpage/" class="btn refresh-btn">
            🔄 Refresh Results
        </a>

        <a href="javascript:history.back()" class="btn back-btn">
            ⬅ Back
        </a>

    </div>

    {% if rdb %}

    <table>

        <tr>
            <th>Username</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        {% for res in rdb %}

        <tr>
            <td>{{ res.username }}</td>
            <td>{{ res.subject }}</td>
            <td>{{ res.marks }}</td>
        </tr>

        {% endfor %}

    </table>

    {% else %}

    <div class="no-data">
        ❌ No Results Found
    </div>

    {% endif %}

</div>

</body>
</html>
