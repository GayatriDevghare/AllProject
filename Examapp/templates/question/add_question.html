```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/questions.css' %}">

    <style>

        body{
            background-image:url('https://img.freepik.com/free-vector/puzzle-solving-question-mark-background-guidance-support_1017-43014.jpg');
            background-repeat:no-repeat;
            background-size:cover;
            background-attachment:fixed;
            font-family:Arial, sans-serif;
        }

        nav{
            text-align:center;
            margin-top:20px;
        }

        nav a{
            text-decoration:none;
            color:white;
            font-weight:bold;
            margin:10px;
            padding:10px;
        }

        nav a:hover{
            color:yellow;
        }

        .container{
            width:550px;
            margin:40px auto;
            background:rgba(0,0,0,0.75);
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px white;
        }

        .container h2{
            text-align:center;
            color:white;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:15px;
        }

        .form-group label{
            display:block;
            color:white;
            font-weight:bold;
            margin-bottom:5px;
        }

        .form-group input{
            width:100%;
            padding:10px;
            border:2px solid white;
            border-radius:5px;
            font-size:15px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#28a745;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#218838;
            transform:scale(1.02);
        }

        .message{
            display:block;
            text-align:center;
            margin-top:20px;
            color:white;
            font-size:18px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <nav>
        <a href="/Examapp/giveaddquestion/">Add Question</a>
        <a href="/Examapp/giveviewquestion/">View Question</a>
        <a href="/Examapp/giveupdatequestion/">Update Question</a>
        <a href="/Examapp/givedeletequestion/">Delete Question</a>
        <a href="/Examapp/givemeshowallquestion/">Show All Questions</a>
        <a href="/Examapp/">Home Page</a>
    </nav>

    <hr>

    <form method="GET" action="/Examapp/addquestion/">

        <div class="container">

            <h2>Add New Question</h2>

            <div class="form-group">
                <label>Question Number</label>
                <input type="number" name="qno" required>
            </div>

            <div class="form-group">
                <label>Question Text</label>
                <input type="text" name="qtext" required>
            </div>

            <div class="form-group">
                <label>Option 1</label>
                <input type="text" name="op1" required>
            </div>

            <div class="form-group">
                <label>Option 2</label>
                <input type="text" name="op2" required>
            </div>

            <div class="form-group">
                <label>Option 3</label>
                <input type="text" name="op3" required>
            </div>

            <div class="form-group">
                <label>Option 4</label>
                <input type="text" name="op4" required>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" required>
            </div>

            <div class="form-group">
                <label>Correct Answer</label>
                <input type="text"
                       name="answer"
                       placeholder="op1 / op2 / op3 / op4"
                       required>
            </div>

            <button type="submit" class="btn">
                ➕ Add Question
            </button>

            <span class="message">
                {{ msg }}
            </span>

        </div>

    </form>

</body>
</html>
```
