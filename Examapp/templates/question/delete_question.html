```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Question</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/questions.css' %}">

    <style>

        body{
            background-image:url('https://www.cdc.gov/clean-hands/media/images/Untitled-design-20.png');
            background-repeat:no-repeat;
            background-size:cover;
            font-family:Arial,sans-serif;
        }

        .container{
            width:600px;
            margin:50px auto;
            background:rgba(0,0,0,0.75);
            padding:30px;
            border-radius:15px;
            color:white;
        }

        h2{
            text-align:center;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:inline-block;
            width:120px;
            font-weight:bold;
        }

        input{
            width:300px;
            padding:8px;
            border-radius:5px;
            border:none;
        }

        .btn{
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin:5px;
            color:white;
        }

        .search-btn{
            background:#007bff;
        }

        .delete-btn{
            background:#dc3545;
        }

        .msg{
            display:block;
            margin-top:20px;
            text-align:center;
            font-weight:bold;
        }

    </style>

</head>

<body>

<form method="GET">

<div class="container">

    <h2>Delete Question</h2>

    <div class="form-group">
        <label>Question No :</label>
        <input type="number"
               name="qno"
               value="{{ qdata.qno|default:'' }}"
               required>
    </div>

    <button type="submit"
            formaction="/Examapp/viewquestion/"
            class="btn search-btn">
        🔍 Search Question
    </button>

    {% if qdata %}

    <hr>

    <div class="form-group">
        <label>Question :</label>
        <input type="text"
               value="{{ qdata.qtext }}"
               readonly>
    </div>

    <div class="form-group">
        <label>Subject :</label>
        <input type="text"
               name="subject"
               value="{{ qdata.subject }}"
               readonly>
    </div>

    <div class="form-group">
        <label>Answer :</label>
        <input type="text"
               value="{{ qdata.ans }}"
               readonly>
    </div>

    <button type="submit"
            formaction="/Examapp/deletequestion/"
            class="btn delete-btn">
        🗑 Delete Question
    </button>

    {% endif %}

    <span class="msg">
        {{ msg }}
    </span>

</div>

</form>

</body>
</html>
```
