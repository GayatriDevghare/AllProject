   ```html
<form method="GET">

<div class="container">

    <h2>Update Question</h2>

    <div class="form-group">
        <label>Question No</label>
        <input type="number" name="qno"
               value="{{ qdata.qno|default:'' }}"
               required>
    </div>

    <div class="form-group">
        <label>Question Text</label>
        <input type="text" name="qtext"
               value="{{ qdata.qtext|default:'' }}">
    </div>

    <div class="form-group">
        <label>Option 1</label>
        <input type="text" name="op1"
               value="{{ qdata.op1|default:'' }}">
    </div>

    <div class="form-group">
        <label>Option 2</label>
        <input type="text" name="op2"
               value="{{ qdata.op2|default:'' }}">
    </div>

    <div class="form-group">
        <label>Option 3</label>
        <input type="text" name="op3"
               value="{{ qdata.op3|default:'' }}">
    </div>

    <div class="form-group">
        <label>Option 4</label>
        <input type="text" name="op4"
               value="{{ qdata.op4|default:'' }}">
    </div>

    <div class="form-group">
        <label>Subject</label>
        <input type="text" name="subject"
               value="{{ qdata.subject|default:'' }}">
    </div>

    <div class="form-group">
        <label>Correct Answer</label>
        <input type="text" name="answer"
               value="{{ qdata.ans|default:'' }}">
    </div>

    <div class="button-container">

        <button type="submit"
                formaction="/Examapp/viewquestion/"
                class="view-btn">
            🔍 View Question
        </button>

        <button type="submit"
                formaction="/Examapp/updatequestion/"
                class="update-btn">
            ✏️ Update Question
        </button>

    </div>

    <div class="message">
        {{ msg }}
    </div>

</div>

</form>
```


</body>

</html>
