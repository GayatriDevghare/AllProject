<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body >

    <div class="container d-flex justify-content-center align-items-center h-100">

        <div class="card shadow-lg p-4" style="width: 600px; border-radius:15px;">

            <h2 class="text-center text-success mb-4">
                Addition Calculator
            </h2>

            <form>

                <div class="mb-3">
                    <label class="form-label">Number 1</label>
                    <input type="number"
                           name="num1"
                           value="{{num1}}"
                           class="form-control"
                           placeholder="Enter First Number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Number 2</label>
                    <input type="number"
                           name="num2"
                           value="{{num2}}"
                           class="form-control"
                           placeholder="Enter Second Number">
                </div>

                <div class="mb-4">
                    <label class="form-label">Answer</label>
                    <input type="number"
                           name="ans"
                           value="{{ans}}"
                           class="form-control"
                           readonly>
                </div>

                <div class="d-flex justify-content-between">

                    <input type="submit"
                           value="Calculate"
                           formaction="/capp/addition/"
                           class="btn btn-success px-4">

                    <button type="submit"
                            formaction="/capp/gethomepage/"
                            class="btn btn-success px-4">
                        Home
                    </button>

                </div>

            </form>

            {% if msg %}
            <div class="alert alert-info mt-4 text-center">
                {{msg}}
            </div>
            {% endif %}

        </div>

    </div>

</body>
</html>
