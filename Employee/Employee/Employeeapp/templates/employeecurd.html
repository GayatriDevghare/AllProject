<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee CRUD</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    style="
      background-image: url(&quot;https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS7CyxwJtNvjDutUDIt6rzPGKl9B5FFvFpFxg&s&quot;);
      background-repeat: no-repeat;
      background-size: cover;
    "
  >
    <nav class="navbar navbar-light bg-light p-3">
      <a class="navbar-brand" href="/Employeeapp/getloginpage/">Login</a>
      <a class="navbar-brand" href="/Employeeapp/getregisterpage/">Register</a>
      <a class="navbar-brand" href="/Employeeapp/getemployeecurdpage/"
        >Employee CRUD</a
      >
    </nav>

    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-header bg-dark text-white">
          <h3 class="text-center">Employee Management</h3>
        </div>

        <div class="card-body">
          <form method="POST">
            {% csrf_token %}

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Employee ID</label>
              <div class="col-sm-6">
                <input
                  type="text"
                  class="form-control"
                  name="employeeid"
                  value="{{ emp.employeeid }}"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Employee Name</label>
              <div class="col-sm-6">
                <input
                  type="text"
                  class="form-control"
                  name="employeename"
                  value="{{ emp.employeename }}"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Employee Email</label>
              <div class="col-sm-6">
                <input
                  type="email"
                  class="form-control"
                  name="employeeemail"
                  value="{{ emp.employeeemail }}"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Password</label>
              <div class="col-sm-6">
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  value="{{ emp.password }}"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Mobile Number</label>
              <div class="col-sm-6">
                <input
                  type="text"
                  class="form-control"
                  name="mobno"
                  value="{{ emp.mobno }}"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Department</label>
              <div class="col-sm-6">
                <input
                  type="text"
                  class="form-control"
                  name="department"
                  value="{{ emp.department }}"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Designation</label>
              <div class="col-sm-6">
                <input
                  type="text"
                  class="form-control"
                  name="designation"
                  value="{{ emp.designation }}"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Salary</label>
              <div class="col-sm-6">
                <input
                  type="number"
                  class="form-control"
                  name="salary"
                  value="{{ emp.salary }}"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label">Date of Joining</label>
              <div class="col-sm-6">
                <input
                  type="date"
                  class="form-control"
                  name="date_of_joining"
                  value="{{ emp.date_of_joining|date:'Y-m-d' }}"
                />
              </div>
            </div>

            <div class="text-center mt-4">
              <button
                type="submit"
                formaction="/Employeeapp/addemployee/"
                class="btn btn-success"
              >
                Add Employee
              </button>

              <button
                type="submit"
                formaction="/Employeeapp/showsingleemployee/"
                class="btn btn-primary"
              >
                Show Single
              </button>

              <button
                type="submit"
                formaction="/Employeeapp/deleteemployeeshowall/"
                class="btn btn-info"
              >
                Show All
              </button>

              <button
                type="submit"
                formaction="/Employeeapp/updateemployee/"
                class="btn btn-warning"
              >
                Update
              </button>

              <button
                type="submit"
                formaction="/Employeeapp/deleteemployee/"
                class="btn btn-danger"
              >
                Delete
              </button>
            </div>

            <div class="text-center mt-4">
              <h5 style="color: green">{{ msg }}</h5>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
