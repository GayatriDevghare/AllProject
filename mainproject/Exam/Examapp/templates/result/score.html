<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table , tr, td, th {
            border: 3px solid purple;
        }
    </style>
</head>
<body style="background-image:url('https://pics.craiyon.com/2023-09-14/c60b8e0daee6412b80111b7ccc8b3381.webp'); background-repeat: no-repeat; background-size: cover;">
    <h1 style="margin-left: 55%; margin-top: 3%;">your score is  {{finalscore}}</h1>  

    <table style="margin-left: 55%; margin-top:1%;">
        <tr>
            <th>Question no</th>
            <th>Question Text</th>
            <th>Selected Option</th>
            <th>Answer</th>
        </tr>
        {% for ans in response %}
        <tr>
            <td>{{ans.0}}</td>
            <td>{{ans.1}}</td>
            <td>{{ans.2}}</td>
            <td>{{ans.3}}</td>
        </tr>
        {% endfor %}

    </table>
</body>
</html>
