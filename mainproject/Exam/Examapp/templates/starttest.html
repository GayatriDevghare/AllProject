<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Question</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        input[type="submit"] {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            background-color: black;
            color: white;
            border: none;
            border-radius: black;
        }

        input[type="submit"]:hover {
            background-color: white;
        }
    </style>
</head>

<body style="text-align:center; background-image:url('https://rare-gallery.com/uploads/posts/500403-vector.jpg'); background-size: cover; font-family: Arial, sans-serif; ">
    <div class="exam-container">
        <header style="margin-top:2%">
            <div class="header-top">
                <span class="username">👤 {{request.session.username}}</span>&nbsp;&nbsp;<br><br>
                
                <button><a href="/Examapp/logoutuser/" style="text-decoration: none; background-image:radial-gradient(blue,light-blue)">Logout</a></button><br>
                <span class="message">{{msg}}</span>
            </div>
            <hr style="width:50%;">
        </header>

        <main>
            <form>
                <input type="number" name="qno" value="{{question.qno}}"> <br><br>
                <input type="hidden" name="answer" value="{{question.ans}}">
                <input type="hidden" name="subject" value="{{question.subject}}">

                <div class="question-box" style="padding:3px;">
                        <input type="text" name="qtext" value="{{question.qtext}}"><br><br>              
                    <div class="options">
                        <label>
                            <input type="radio" name="op" value="{{question.op1}}"> {{question.op1}}
                        </label>
                        <label>
                            <input type="radio" name="op" value="{{question.op2}}"> {{question.op2}}
                        </label>
                        <label>
                            <input type="radio" name="op" value="{{question.op3}}"> {{question.op3}}
                        </label>
                        <label>
                            <input type="radio" name="op" value="{{question.op4}}"> {{question.op4}}
                        </label>
                    </div>
                </div><br>

                <div class="nav-buttons">
                    <input type="submit" value="⏮ Previous" formaction="/Examapp/previousquestion/">
                    <input type="submit" value="⏭ Next" formaction="/Examapp/nextquestion/">
                    <input type="submit" id="endExamBtn" value="⏹ End Exam" formaction="/Examapp/endtest/" class="end-btn">
                </div>
            </form>
        </main>
    </div>
</body>

</html>
